<!DOCTYPE html>
<html>
  <head>
    <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background: white;
      padding: 30px;
    }
    h1{
      color: coral;
      text-align: center;
    
    }
    .intro{
color: orange;
font-size: 20px;
 }
ul{
font-size: 22px;

}
li:nth-child(3){
  color: red;
  font-weight: bold;
  background: yellow;

}
.description{
font-size: 20px;
margin-top: 20px;

}
.description::first-letter{
  font-size: 40px;
  color: red;
  font-weight:bold;
}
button{
  padding: 12px 25px;
  margin: 15px;
  border: none;
  background: orange;
  color: white;
  font-size: 18px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover{
  background: red;
  box-shadow: 0 0 15px red;
}


    </style>
